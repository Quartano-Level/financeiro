name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --coverage
      - run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --coverage

  tag-release:
    name: Tag Release
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag + GitHub Release from package.json version (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # App version is FE+BE lockstep; read from frontend package.json.
          VERSION=$(node -p "require('./src/frontend/package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to release (no version bump in this push)."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "See CHANGELOG.md for details." || \
            echo "::warning::Release creation failed (tag pushed); continuing."
