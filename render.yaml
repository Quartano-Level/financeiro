# Render Blueprint — Columbia Financeiro backend (Express, src/backend).
# Deploy: Render reads this file from the repo root. Frontend is on Vercel and
# the database on Supabase (see DEPLOY.md). Secret envs use sync:false so they
# are set manually in the Render dashboard (never committed).
services:
  - type: web
    name: financeiro-backend
    runtime: node
    rootDir: src/backend
    plan: starter
    branch: main
    # Native auto-deploy on push to `main`. The gate is GitHub branch protection
    # (CI `Backend`/`Frontend` checks required to merge), so only tested code
    # reaches `main` and gets deployed. `preDeployCommand` below runs the DB
    # migrations before traffic switches; a failed build/migration is not
    # promoted. See .github/workflows/ci.yml (gates only — no deploy job).
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    # Runs migrations + admin seed before serving traffic on each deploy.
    preDeployCommand: npm run migrate && npm run seed:admin
    healthCheckPath: /health
    envVars:
      # Non-secret, fixed defaults.
      - key: environment
        value: production
      - key: client_name
        value: local
      - key: DEV_AUTH_BYPASS
        value: 'false'
      # Frente II (SISPAG) liberada em produção (v0.17.4). Painel/ingestão/formação/revisão
      # navegáveis; geração de remessa (fin015) e retorno (fin052) seguem dormentes/gated.
      - key: SISPAG_ENABLED
        value: 'true'
      # Fase 3 (ADR-0013) — ESCRITA no fin010. FONTE ÚNICA = dashboard do Render (sync:false), para
      # NÃO ter o blueprint sobrescrevendo o dashboard a cada deploy (Regis P0 deployability — yaml
      # brigando com dashboard). Produção hoje: WRITE_ENABLED=true, DRY_RUN=false, BASE_URL=prd.
      # Runbook: docs/runbooks/fin010-write-cutover.md.
      - key: CONEXOS_BASE_URL
        sync: false
      - key: CONEXOS_WRITE_ENABLED
        sync: false
      - key: CONEXOS_DRY_RUN
        sync: false
      # Secrets / per-deploy values — set in the Render dashboard.
      - key: databaseConnectionString
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CONEXOS_USERNAME
        sync: false
      - key: CONEXOS_PASSWORD
        sync: false
      - key: CONEXOS_FIL_COD
        sync: false
